<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input[list] {
            width: 350px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 20px;
        }

        .movies {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background: white;
            width: 200px;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
        }

        .title {
            margin-top: 10px;
            font-weight: bold;
        }

        .no-poster {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ddd;
            border-radius: 8px;
            color: #555;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movie Recommendation System</h1>

        <form method="POST">
            <label for="movie">Select a Movie:</label>
            <input
                list="movies"
                id="movie"
                name="movie"
                placeholder="Type and choose a movie"
                value="{{ selected_movie }}"
                required
            >

            <datalist id="movies">
                {% for movie in movie_list %}
                    <option value="{{ movie }}">
                {% endfor %}
            </datalist>

            <button type="submit">Recommend</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="movies">
            {% for movie in recommendations %}
                <div class="card">
                    {% if movie.poster %}
                        <img src="{{ movie.poster }}" alt="{{ movie.title }}">
                    {% else %}
                        <div class="no-poster">No poster available</div>
                    {% endif %}
                    <div class="title">{{ movie.title }}</div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
